<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1vs1チャレンジ</title>
<style>
  :root{--kit:#ff5c39;--ok:#42d77d;--ng:#ff4d6d;--gold:#ffd23f;--blue:#5ab0ff;--ink:#f4f8f2}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#000;color:var(--ink);
    font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
    touch-action:manipulation;user-select:none;-webkit-user-select:none}
  #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;
    transform:scaleX(-1);filter:saturate(.95) brightness(.95)}
  #shade{position:fixed;inset:0;background:linear-gradient(#000a 0%,#0001 22%,#0001 72%,#000b 100%)}
  #fx{position:fixed;inset:0;z-index:3;pointer-events:none}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;
    padding:calc(10px + env(safe-area-inset-top,0)) 18px 8px;z-index:5;pointer-events:none}
  .hb{text-align:center;line-height:1.05}
  .hb .l{font-size:9px;letter-spacing:.2em;opacity:.65}
  .hb .v{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
  #track{position:fixed;top:calc(14px + env(safe-area-inset-top,0));left:50%;transform:translateX(-50%);
    z-index:6;font-size:10px;letter-spacing:.15em;padding:4px 12px;border-radius:99px;
    background:#00000088;pointer-events:none;display:flex;align-items:center;gap:6px}
  #dot{width:8px;height:8px;border-radius:50%;background:#666}
  #dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  #cue{position:fixed;top:calc(64px + env(safe-area-inset-top,0));left:0;right:0;text-align:center;z-index:5;
    pointer-events:none;font-size:19px;font-weight:900;letter-spacing:.04em;
    text-shadow:0 3px 16px #000;min-height:28px;padding:0 14px}
  #sub{position:fixed;top:calc(94px + env(safe-area-inset-top,0));left:0;right:0;text-align:center;z-index:5;
    pointer-events:none;font-size:12px;opacity:.85;text-shadow:0 2px 10px #000}
  #big{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:7;
    font-size:min(18vw,96px);font-weight:900;text-shadow:0 6px 30px #000;text-align:center;line-height:1.2;
    opacity:0;pointer-events:none;transition:opacity .15s,transform .15s;transform:scale(.7)}
  #big.show{opacity:1;transform:scale(1)}
  #timerBar{position:fixed;top:0;left:0;height:4px;background:var(--gold);width:0%;z-index:8}
  #sepWrap{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom,0));left:50%;
    transform:translateX(-50%);width:64%;max-width:300px;z-index:5;text-align:center;pointer-events:none}
  #sepLbl{font-size:10px;letter-spacing:.2em;opacity:.7;margin-bottom:4px}
  #sep{height:9px;border-radius:99px;background:#ffffff20;overflow:hidden}
  #sepFill{height:100%;width:0%;border-radius:99px;
    background:linear-gradient(90deg,var(--ng),var(--gold),var(--ok))}
  #overlay{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 30%,#132a1c 0%,#050a07 78%);overflow-y:auto}
  #overlay.hide{display:none}
  .card{text-align:center;padding:26px 22px;max-width:390px;width:100%}
  .kick{font-size:11px;letter-spacing:.35em;color:var(--gold);margin-bottom:10px}
  .card h1{font-size:29px;font-weight:900;line-height:1.25;margin-bottom:6px}
  .card h1 em{color:var(--kit);font-style:normal}
  .ver{font-size:10px;opacity:.5;margin-bottom:12px;letter-spacing:.1em}
  .modeRow{display:block}
  .modeBtn{display:block;width:100%;border:2px solid #ffffff22;border-radius:18px;
    background:#ffffff10;color:var(--ink);font-family:inherit;text-align:left;
    padding:13px 15px;margin-bottom:11px;transition:transform .08s}
  .modeBtn:active{transform:scale(.97)}
  .modeBtn.sel{border-color:var(--kit);background:#ff5c3922}
  .modeBtn .mt{font-size:16px;font-weight:800;margin-bottom:3px}
  .modeBtn .md{font-size:11.5px;line-height:1.7;opacity:.8}
  .steps{font-size:12px;background:#ffffff12;border-radius:14px;padding:11px 14px;
    line-height:1.9;text-align:left;margin:2px 0 14px}
  #resultBox{display:none;margin-bottom:14px}
  #resultBox .bigv{font-size:42px;font-weight:900;color:var(--gold)}
  #resultBox .sub{font-size:13px;opacity:.9;line-height:2}
  .mainBtn{border:none;border-radius:999px;padding:15px 44px;font-size:16px;font-weight:800;
    font-family:inherit;color:#fff;background:linear-gradient(135deg,#ff8a63,var(--kit));
    box-shadow:0 6px 22px #ff5c3966}
  #err{display:none;font-size:12px;line-height:1.9;color:#ffb3b3;background:#4d101055;
    border-radius:12px;padding:12px;margin-top:14px;text-align:left}
  @media (orientation: landscape) and (max-height: 520px){
    .hb .v{font-size:19px}.hb .l{font-size:8px}
    #cue{top:calc(52px + env(safe-area-inset-top,0));font-size:16px}
    #sub{top:calc(76px + env(safe-area-inset-top,0));font-size:11px}
    #big{font-size:min(12vw,80px)}
    #sepWrap{bottom:calc(8px + env(safe-area-inset-bottom,0));width:40%}
    #overlay{align-items:flex-start}
    .card{max-width:660px;padding:16px 24px calc(16px + env(safe-area-inset-bottom,0))}
    .card h1{font-size:22px}
    .modeRow{display:flex;gap:10px}
    .steps{margin-bottom:10px}
  }
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<div id="shade"></div>
<canvas id="fx"></canvas>
<div id="timerBar"></div>

<div id="hud">
  <div class="hb"><div class="l">ゴール</div><div class="v" id="score" style="color:var(--ok)">0</div></div>
  <div class="hb" style="width:120px"></div>
  <div class="hb"><div class="l">DFレベル</div><div class="v" id="lvl" style="color:var(--blue)">1</div></div>
</div>
<div id="track"><span id="dot"></span><span id="trackLbl">検知待ち</span></div>
<div id="cue"></div><div id="sub"></div>
<div id="big"></div>

<div id="sepWrap">
  <div id="sepLbl">DFを振り切れ！</div>
  <div id="sep"><div id="sepFill"></div></div>
</div>

<div id="overlay">
  <div class="card">
    <div class="kick">FACE TO FACE</div>
    <h1><em>1vs1</em>チャレンジ</h1>
    <div class="ver">v4</div>
    <div id="resultBox">
      <div class="bigv" id="rScore"></div>
      <div class="sub" id="rDetail"></div>
    </div>
    <div id="modeSel">
      <div class="modeRow">
      <button class="modeBtn sel" id="modeReal">
        <div class="mt">⚽ 実ボールモード</div>
        <div class="md">足元にボールを置き、中央のDFシルエットと正面で対峙。振り切って、ボールごと左右のゴールゲートへ！</div>
      </button>
      <button class="modeBtn" id="modeVirtual">
        <div class="mt">🎮 仮想ボールモード</div>
        <div class="md">仮想ボールが足元についてくる。DFに密着されると奪われる！振り切ってゲートへ運べばゴール。</div>
      </button>
      </div>
      <div class="steps">
        📱 全身が映る位置へ（2〜3歩さがる）<br>
        🧍 最初に「静止→左右に動く」の2段階でカメラ調整<br>
        🟡 黄色い<b>YOUマーカー</b>があなたの検知位置<br>
        🔴 中央のDFが遅れて追ってくる → 逆を取れ！<br>
        🥅 <b>振り切った状態で左右のゲートまで動けば1点</b>
      </div>
    </div>
    <button class="mainBtn" id="startBtn">カメラを起動してキックオフ</button>
    <div id="err"></div>
  </div>
</div>

<script>
(()=>{
const $=id=>document.getElementById(id);
const video=$('video');
const AC=112,AR=84;
const a=document.createElement('canvas');a.width=AC;a.height=AR;
const actx=a.getContext('2d',{willReadFrequently:true});
let prevF=null,stream=null;
let state='idle',mode='real';
const TOTAL=7;
let round=0,score=0;

const speak=t=>{try{const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=1.15;
  speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}};
const vib=p=>{if(navigator.vibrate)navigator.vibrate(p)};
const CUE=$('cue'),SUB=$('sub'),BIG=$('big');
function bigMsg(t,c,ms=850){BIG.textContent=t;BIG.style.color=c||'#fff';
  BIG.classList.add('show');setTimeout(()=>BIG.classList.remove('show'),ms);}
function timerBar(p){$('timerBar').style.width=(p*100)+'%';}

const fx=$('fx'),fctx=fx.getContext('2d');
let FW=0,FH=0;
function fxResize(){FW=innerWidth;FH=innerHeight;
  const d=Math.min(devicePixelRatio||1,2);
  fx.width=FW*d;fx.height=FH*d;fctx.setTransform(d,0,0,d,0,0);}
addEventListener('resize',fxResize);fxResize();

// ===== tracking v3 =====
// キャリブレーションで「列ごとのノイズ地図」を作り、それを差し引いた動きだけを見る。
// これでカーテン・テレビ・照明のちらつき等の固定ノイズ源に引っ張られない。
const colE=new Float32Array(AC);
const colNoise=new Float32Array(AC);
let userX=0,tracking=false;
function rawCols(){
  actx.save();actx.scale(-1,1);actx.drawImage(video,-AC,0,AC,AR);actx.restore();
  const cur=actx.getImageData(0,0,AC,AR).data;
  const col=new Float32Array(AC);
  if(prevF){
    for(let y=0;y<AR;y+=2){
      for(let x=0;x<AC;x++){
        const i=(y*AC+x)*4;
        const d=Math.abs(cur[i]-prevF[i])+Math.abs(cur[i+1]-prevF[i+1])+Math.abs(cur[i+2]-prevF[i+2]);
        if(d>46)col[x]++;
      }
    }
  }
  prevF=cur.slice();
  return col;
}
function track(){
  const col=rawCols();
  let P=0,SX=0;
  for(let x=0;x<AC;x++){
    const adj=Math.max(0,col[x]-(colNoise[x]*1.8+0.4)); // ノイズ地図を差し引く
    colE[x]=colE[x]*0.90+adj;
    P+=colE[x];SX+=colE[x]*x;
  }
  tracking=P>10;
  if(P>8){
    const cx=(SX/P)/(AC-1)*2-1;
    userX+=(cx-userX)*0.5;
    userX=Math.max(-1,Math.min(1,userX));
  }
  $('dot').classList.toggle('on',tracking);
  $('trackLbl').textContent=tracking?'検知中':'動いて位置を教えて';
}

// ===== defender：中央基点＋遅延追跡 =====
let dfX=0,hist=[];
let dfSpeed=1.6,dfReact=380;
function dfUpdate(dt){
  const now=performance.now();
  hist.push({t:now,x:userX});
  while(hist.length&&now-hist[0].t>1200)hist.shift();
  let target=userX;
  for(let i=hist.length-1;i>=0;i--){if(now-hist[i].t>=dfReact){target=hist[i].x;break;}}
  if(!tracking)target=0;                    // 見失ったら中央へ戻る
  const dx=target-dfX;
  dfX+=Math.sign(dx)*Math.min(Math.abs(dx),dfSpeed*dt);
  dfX+=(0-dfX)*0.06*dt;                     // わずかに中央へ寄る癖
  dfX=Math.max(-0.85,Math.min(0.85,dfX));
}

// ===== drawing =====
function drawSilhouette(cx,h,alpha,lean){
  const yTop=FH*0.5-h*0.45;
  fctx.save();
  fctx.translate(cx,yTop);
  fctx.rotate(Math.max(-0.12,Math.min(0.12,lean*0.1)));
  fctx.fillStyle=`rgba(255,55,55,${alpha})`;
  fctx.strokeStyle=`rgba(255,130,110,${Math.min(1,alpha+0.2)})`;
  fctx.lineWidth=3;
  const u=h/100;
  fctx.beginPath();
  fctx.arc(0,8*u,7.5*u,0,7);
  fctx.moveTo(-9*u,18*u);fctx.quadraticCurveTo(-11*u,40*u,-8*u,55*u);
  fctx.lineTo(8*u,55*u);fctx.quadraticCurveTo(11*u,40*u,9*u,18*u);fctx.closePath();
  fctx.moveTo(-9*u,22*u);fctx.quadraticCurveTo(-27*u,28*u,-36*u,24*u);
  fctx.lineTo(-35*u,31*u);fctx.quadraticCurveTo(-24*u,35*u,-8*u,30*u);fctx.closePath();
  fctx.moveTo(9*u,22*u);fctx.quadraticCurveTo(27*u,28*u,36*u,24*u);
  fctx.lineTo(35*u,31*u);fctx.quadraticCurveTo(24*u,35*u,8*u,30*u);fctx.closePath();
  fctx.moveTo(-8*u,55*u);fctx.quadraticCurveTo(-15*u,75*u,-20*u,96*u);
  fctx.lineTo(-12*u,98*u);fctx.quadraticCurveTo(-6*u,76*u,-2*u,57*u);fctx.closePath();
  fctx.moveTo(8*u,55*u);fctx.quadraticCurveTo(15*u,75*u,20*u,96*u);
  fctx.lineTo(12*u,98*u);fctx.quadraticCurveTo(6*u,76*u,2*u,57*u);fctx.closePath();
  fctx.fill();fctx.stroke();
  fctx.fillStyle=`rgba(255,255,255,${Math.min(1,alpha+0.35)})`;
  fctx.font=`bold ${10*u}px sans-serif`;fctx.textAlign='center';
  fctx.fillText('DF',0,40*u);
  fctx.restore();
}
// ゴールゲート：常時はっきり見える柱＋コーン＋旗
function drawGate(side,open){
  const x=side<0?FW*0.06:FW*0.94;
  const topY=FH*0.28,botY=FH*0.88;
  const pulse=0.5+Math.sin(performance.now()/160)*0.25;
  // 縦の光る柱
  const grad=fctx.createLinearGradient(x,topY,x,botY);
  if(open){
    grad.addColorStop(0,`rgba(66,215,125,0)`);
    grad.addColorStop(0.5,`rgba(66,215,125,${0.55*pulse+0.25})`);
    grad.addColorStop(1,`rgba(66,215,125,0.7)`);
  }else{
    grad.addColorStop(0,'rgba(255,210,63,0)');
    grad.addColorStop(0.5,'rgba(255,210,63,0.35)');
    grad.addColorStop(1,'rgba(255,210,63,0.55)');
  }
  fctx.fillStyle=grad;
  fctx.fillRect(x-6,topY,12,botY-topY);
  // コーン
  const h=Math.min(FH*0.13,92);
  fctx.save();
  if(open){fctx.shadowColor='#42d77d';fctx.shadowBlur=24;}
  fctx.fillStyle='#ff7b1f';
  fctx.beginPath();
  fctx.moveTo(x,botY-h);fctx.lineTo(x-h*0.44,botY);fctx.lineTo(x+h*0.44,botY);
  fctx.closePath();fctx.fill();
  fctx.fillStyle='#fff';
  fctx.beginPath();
  fctx.moveTo(x-h*0.2,botY-h*0.52);fctx.lineTo(x+h*0.2,botY-h*0.52);
  fctx.lineTo(x+h*0.27,botY-h*0.34);fctx.lineTo(x-h*0.27,botY-h*0.34);
  fctx.closePath();fctx.fill();
  fctx.fillStyle='#e05f00';
  fctx.fillRect(x-h*0.52,botY-3,h*1.04,6);
  fctx.restore();
  // ラベル
  fctx.fillStyle=open?'#42d77d':'rgba(255,255,255,0.85)';
  fctx.font='bold 14px sans-serif';fctx.textAlign='center';
  fctx.fillText(open?'GOAL!':'ゴール',x,topY-8);
  fctx.font='20px sans-serif';
  fctx.fillText('🚩',x,topY+18);
}
const vball={trail:[],anim:null,animT:0,fromX:0,toX:0};
let stealT=0;
function draw(dt){
  fctx.clearRect(0,0,FW,FH);
  if(state==='idle')return;
  const landscape=FW>FH;
  const dfH=landscape?FH*0.74:FH*0.56;
  const range=FW*0.40;
  const sep=Math.abs(userX-dfX);
  const cleared=sep>0.45;
  // ゲート（常時表示）
  drawGate(-1,cleared&&userX<dfX);
  drawGate(1,cleared&&userX>dfX);
  // DF
  const dfPx=FW/2+dfX*range;
  drawSilhouette(dfPx,dfH,0.36,userX-dfX);
  // あなた側
  const uPx=FW/2+userX*range;
  if(mode==='virtual'){
    let bx=uPx,by=FH*0.80;
    if(vball.anim==='fly'){
      vball.animT+=dt;
      const t=Math.min(1,vball.animT/0.5);
      bx=vball.fromX+(vball.toX-vball.fromX)*t;
      by=FH*0.80-FH*0.22*Math.sin(t*Math.PI);
      if(t>=1)vball.anim=null;
    }else if(vball.anim==='steal'){
      vball.animT+=dt;
      bx=vball.fromX;by=FH*0.80-vball.animT*420;
      if(vball.animT>0.8)vball.anim=null;
    }
    vball.trail.push({x:bx,y:by,life:.3});
    vball.trail.forEach(t=>t.life-=dt);
    vball.trail=vball.trail.filter(t=>t.life>0);
    vball.trail.forEach(t=>{fctx.fillStyle=`rgba(255,255,255,${t.life})`;
      fctx.beginPath();fctx.arc(t.x,t.y,13*t.life*2,0,7);fctx.fill();});
    fctx.fillStyle='rgba(0,0,0,.35)';
    fctx.beginPath();fctx.ellipse(bx,by+15,15,6,0,0,7);fctx.fill();
    fctx.fillStyle='#fff';fctx.beginPath();fctx.arc(bx,by,14,0,7);fctx.fill();
    fctx.strokeStyle='#222';fctx.lineWidth=1.5;
    fctx.beginPath();fctx.arc(bx,by,14,0,7);fctx.stroke();
  }else{
    fctx.strokeStyle='rgba(255,210,63,0.9)';fctx.lineWidth=3;
    fctx.beginPath();fctx.ellipse(uPx,FH*0.84,26,10,0,0,7);fctx.stroke();
  }
  // YOUマーカー
  fctx.fillStyle=tracking?'#ffd23f':'#888';
  fctx.beginPath();
  fctx.moveTo(uPx,FH*0.15);fctx.lineTo(uPx-9,FH*0.15-14);fctx.lineTo(uPx+9,FH*0.15-14);
  fctx.closePath();fctx.fill();
  fctx.font='bold 11px sans-serif';fctx.textAlign='center';
  fctx.fillText('YOU',uPx,FH*0.15-20);
  $('sepFill').style.width=Math.min(100,sep/0.45*72)+'%';
}

// ===== game flow =====
let roundT=0,roundDur=12000,phase=null;
function nextRound(){
  round++;timerBar(0);stealT=0;
  if(round>TOTAL)return endGame();
  $('lvl').textContent=round;
  dfSpeed=1.4+round*0.22;
  dfReact=Math.max(170,420-round*36);
  dfX=0;hist=[];                    // DFは毎ラウンド中央スタート
  state='play';phase='play';roundT=performance.now();
  CUE.textContent=`ラウンド ${round}／振り切ってゲートへ！`;
  SUB.textContent='左右に揺さぶって、逆を取れ';
  speak('抜け出せ！');vib(30);
}
function judge(dt){
  const now=performance.now();
  const el=(now-roundT)/roundDur;
  timerBar(Math.min(1,el));
  const sep=Math.abs(userX-dfX);
  if(Math.abs(userX)>0.70&&sep>0.45){
    phase='feedback';
    score++;$('score').textContent=score;
    if(mode==='virtual'){
      vball.fromX=FW/2+userX*FW*0.40;
      vball.toX=userX>0?FW*0.94:FW*0.06;
      vball.anim='fly';vball.animT=0;
    }
    bigMsg('ゴール!!','var(--gold)');speak('ゴール！');vib([40,30,100]);
    CUE.textContent='';SUB.textContent='';
    setTimeout(nextRound,1400);
    return;
  }
  if(Math.abs(userX)>0.70&&sep<=0.45&&phase==='play'){
    if(!judge.blockCool||now-judge.blockCool>1500){
      judge.blockCool=now;
      bigMsg('まだ付かれてる!','var(--blue)',600);
      SUB.textContent='一度中央へ戻って、揺さぶり直せ！';
      vib(60);
    }
  }
  if(mode==='virtual'){
    if(sep<0.13)stealT+=dt;else stealT=Math.max(0,stealT-dt*2);
    if(stealT>0.8){
      phase='feedback';
      vball.fromX=FW/2+userX*FW*0.40;
      vball.anim='steal';vball.animT=0;
      bigMsg('奪われた!','var(--ng)');speak('取られた！');vib(150);
      CUE.textContent='';SUB.textContent='';
      setTimeout(nextRound,1100);
      return;
    }
  }
  if(el>=1){
    phase='feedback';
    bigMsg('タイムアップ','var(--ng)');speak('タイムアップ');vib(120);
    CUE.textContent='';SUB.textContent='';
    setTimeout(nextRound,1100);
  }
}
function endGame(){
  state='done';timerBar(0);
  $('resultBox').style.display='block';
  $('rScore').textContent=`ゴール ${score} / ${TOTAL}`;
  $('rDetail').innerHTML=(mode==='real'?'⚽実ボール':'🎮仮想ボール')+'モード<br>'+
    (score>=6?'DF殺しの切れ味。誰にも止められない。':score>=4?'いい揺さぶり。緩→急の変化をもっと極端に。':'コツ：小さく2回誘ってから、逆へ大きな一歩！');
  document.querySelector('.card h1').innerHTML='トレーニング終了';
  $('startBtn').textContent='もう一回';
  $('overlay').classList.remove('hide');
  speak('お疲れさま');
}

// ===== 2段階キャリブレーション =====
function startCalib(){
  state='calib';
  // 第1段階：静止してノイズ地図を作る
  CUE.textContent='① 中央に立って、静止して';
  SUB.textContent='背景ノイズを学習中…';
  colNoise.fill(0);colE.fill(0);userX=0;dfX=0;
  const acc=new Float32Array(AC);let n=0;
  const t0=performance.now();
  const iv=setInterval(()=>{
    const col=rawCols();
    for(let x=0;x<AC;x++)acc[x]=Math.max(acc[x],col[x]); // 最大値でノイズ地図
    n++;
    const sec=(performance.now()-t0)/1000;
    SUB.textContent=`背景ノイズを学習中… ${Math.max(0,(2.5-sec)).toFixed(1)}`;
    if(sec>2.5){
      clearInterval(iv);
      for(let x=0;x<AC;x++)colNoise[x]=acc[x];
      // 第2段階：動いてトラッキング確認
      CUE.textContent='② 左右に1歩ずつ動いてみて';
      SUB.textContent='黄色いYOUマーカーが付いてくればOK！';
      const t1=performance.now();
      const iv2=setInterval(()=>{
        track();
        const sec2=(performance.now()-t1)/1000;
        if(sec2>3.5){clearInterval(iv2);nextRound();}
      },60);
    }
  },60);
}
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-lastT)/1000,0.05);lastT=t;
  if(stream&&video.readyState>=2&&state==='play'){
    track();
    dfUpdate(dt);
    if(phase==='play')judge(dt);
  }
  draw(dt);
}

function selMode(m){
  mode=m;
  $('modeReal').classList.toggle('sel',m==='real');
  $('modeVirtual').classList.toggle('sel',m==='virtual');
}
$('modeReal').addEventListener('click',()=>selMode('real'));
$('modeVirtual').addEventListener('click',()=>selMode('virtual'));
$('startBtn').addEventListener('click',async()=>{
  $('err').style.display='none';
  if(!stream){
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640}},audio:false});
      video.srcObject=stream;await video.play();
    }catch(e){
      $('err').style.display='block';
      $('err').innerHTML='カメラを起動できませんでした（'+e.name+'）。ブラウザのカメラ許可を確認してください。';
      return;
    }
  }
  round=0;score=0;
  $('score').textContent=0;$('lvl').textContent=1;
  $('overlay').classList.add('hide');
  setTimeout(startCalib,500);
});
requestAnimationFrame(loop);
})();
</script>
