<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1vs1チャレンジ</title>
<style>
  :root{--kit:#ff5c39;--ok:#42d77d;--ng:#ff4d6d;--gold:#ffd23f;--blue:#5ab0ff;--ink:#f4f8f2}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#000;color:var(--ink);
    font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
    touch-action:manipulation;user-select:none;-webkit-user-select:none}
  #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;
    transform:scaleX(-1);filter:saturate(.9) brightness(.9)}
  #shade{position:fixed;inset:0;background:linear-gradient(#000b 0%,#0002 28%,#0002 68%,#000d 100%)}
  #fx{position:fixed;inset:0;z-index:3;pointer-events:none}
  .zone{position:fixed;top:0;bottom:0;width:33%;opacity:0;transition:opacity .1s;pointer-events:none}
  #zoneL{left:0;background:linear-gradient(90deg,#42d77d50,transparent)}
  #zoneR{right:0;background:linear-gradient(-90deg,#42d77d50,transparent)}
  .zone.hit{opacity:1}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;
    padding:calc(10px + env(safe-area-inset-top,0)) 18px 8px;z-index:5}
  .hb{text-align:center;line-height:1.05}
  .hb .l{font-size:9px;letter-spacing:.2em;opacity:.6}
  .hb .v{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
  #dfWrap{position:fixed;top:17%;left:0;right:0;display:flex;justify-content:center;z-index:4;pointer-events:none}
  #defender{font-size:70px;line-height:1;transition:transform .16s cubic-bezier(.3,1.5,.5,1),font-size .5s;
    filter:drop-shadow(0 8px 24px #000c)}
  #dfState{position:fixed;top:calc(17% + 88px);left:0;right:0;text-align:center;z-index:4;
    font-size:12px;letter-spacing:.15em;opacity:.75;pointer-events:none}
  #cue{position:fixed;bottom:27%;left:0;right:0;text-align:center;z-index:5;pointer-events:none;
    font-size:21px;font-weight:900;letter-spacing:.04em;text-shadow:0 3px 16px #000;min-height:34px;padding:0 16px}
  #sub{position:fixed;bottom:calc(27% - 30px);left:0;right:0;text-align:center;z-index:5;pointer-events:none;
    font-size:12.5px;opacity:.8;text-shadow:0 2px 10px #000}
  #big{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:7;
    font-size:min(20vw,104px);font-weight:900;text-shadow:0 6px 30px #000;text-align:center;line-height:1.2;
    opacity:0;pointer-events:none;transition:opacity .15s,transform .15s;transform:scale(.7)}
  #big.show{opacity:1;transform:scale(1)}
  #gaugeWrap{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom,0));left:50%;
    transform:translateX(-50%);width:74%;max-width:340px;z-index:5;text-align:center;pointer-events:none}
  #gaugeLbl{font-size:10px;letter-spacing:.2em;opacity:.65;margin-bottom:5px}
  #gauge{height:10px;border-radius:99px;background:#ffffff20;overflow:hidden}
  #gFill{height:100%;width:0%;border-radius:99px;transition:width .1s;
    background:linear-gradient(90deg,var(--blue),var(--gold),var(--kit))}
  #timerBar{position:fixed;top:0;left:0;height:4px;background:var(--gold);width:0%;z-index:8;transition:width .1s linear}
  /* overlay */
  #overlay{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 30%,#132a1c 0%,#050a07 78%);overflow-y:auto}
  #overlay.hide{display:none}
  .card{text-align:center;padding:26px 22px;max-width:380px;width:100%}
  .kick{font-size:11px;letter-spacing:.35em;color:var(--gold);margin-bottom:10px}
  .card h1{font-size:28px;font-weight:900;line-height:1.25;margin-bottom:16px}
  .card h1 em{color:var(--kit);font-style:normal}
  .modeBtn{display:block;width:100%;border:2px solid #ffffff22;border-radius:18px;
    background:#ffffff10;color:var(--ink);font-family:inherit;text-align:left;
    padding:14px 16px;margin-bottom:12px;transition:transform .08s}
  .modeBtn:active{transform:scale(.97)}
  .modeBtn.sel{border-color:var(--kit);background:#ff5c3922}
  .modeBtn .mt{font-size:16px;font-weight:800;margin-bottom:3px}
  .modeBtn .md{font-size:11.5px;line-height:1.7;opacity:.8}
  .steps{font-size:12px;background:#ffffff12;border-radius:14px;padding:11px 14px;
    line-height:1.9;text-align:left;margin:4px 0 14px}
  #resultBox{display:none;margin-bottom:16px}
  #resultBox .bigv{font-size:42px;font-weight:900;color:var(--gold)}
  #resultBox .sub{font-size:13px;opacity:.9;line-height:2}
  .mainBtn{border:none;border-radius:999px;padding:15px 44px;font-size:16px;font-weight:800;
    font-family:inherit;color:#fff;background:linear-gradient(135deg,#ff8a63,var(--kit));
    box-shadow:0 6px 22px #ff5c3966}
  #err{display:none;font-size:12px;line-height:1.9;color:#ffb3b3;background:#4d101055;
    border-radius:12px;padding:12px;margin-top:14px;text-align:left}
  /* ===== 横画面対応 ===== */
  @media (orientation: landscape) and (max-height: 520px){
    #hud{padding:calc(6px + env(safe-area-inset-top,0)) calc(18px + env(safe-area-inset-left,0)) 4px
      calc(18px + env(safe-area-inset-left,0))}
    .hb .v{font-size:19px}.hb .l{font-size:8px}
    #dfWrap{top:12%}
    #dfState{top:calc(12% + 64px);font-size:11px}
    #cue{bottom:20%;font-size:17px}
    #sub{bottom:calc(20% - 24px);font-size:11px}
    #big{font-size:min(13vw,84px)}
    #gaugeWrap{bottom:calc(8px + env(safe-area-inset-bottom,0));width:44%;max-width:280px}
    #gaugeLbl{font-size:9px;margin-bottom:3px}
    #gauge{height:7px}
    /* オーバーレイ：縦スクロール＋モードを横並び */
    #overlay{align-items:flex-start}
    .card{max-width:640px;padding:18px 24px calc(18px + env(safe-area-inset-bottom,0))}
    .card h1{font-size:23px;margin-bottom:10px}
    .kick{margin-bottom:6px}
    #modeSel .modeRow{display:flex;gap:10px}
    .modeBtn{margin-bottom:10px}
    .steps{margin:0 0 10px}
  }
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<div id="shade"></div>
<canvas id="fx"></canvas>
<div class="zone" id="zoneL"></div><div class="zone" id="zoneR"></div>
<div id="timerBar"></div>

<div id="hud">
  <div class="hb"><div class="l">突破</div><div class="v" id="score" style="color:var(--ok)">0</div></div>
  <div class="hb"><div class="l">ROUND</div><div class="v" id="round">-</div></div>
  <div class="hb"><div class="l">フェイント質</div><div class="v" id="fq" style="color:var(--gold)">-</div></div>
</div>

<div id="dfWrap"><div id="defender">🧍</div></div>
<div id="dfState"></div>
<div id="cue"></div><div id="sub"></div>
<div id="big"></div>

<div id="gaugeWrap">
  <div id="gaugeLbl">フェイントゲージ</div>
  <div id="gauge"><div id="gFill"></div></div>
</div>

<div id="overlay">
  <div class="card">
    <div class="kick">BODY × CAMERA TRAINING</div>
    <h1><em>1vs1</em>チャレンジ</h1>
    <div id="resultBox">
      <div class="bigv" id="rScore"></div>
      <div class="sub" id="rDetail"></div>
    </div>
    <div id="modeSel">
      <div class="modeRow">
      <button class="modeBtn sel" id="modeReal">
        <div class="mt">⚽ ボールあり</div>
        <div class="md">実際のボールを足元に置いてプレー。シザース・キックフェイントでDFを釣り、逆へ持ち出して突破。3ラウンドごとにタッチ課題。</div>
      </button>
      <button class="modeBtn" id="modeVirtual">
        <div class="mt">🎮 ボール無し（仮想ボール）</div>
        <div class="md">画面に仮想ボールが出現。あなたの体の動きでボールが左右に動く。フェイント→DFが飛んだら逆へ抜けて、仮想ボールがゴールへ突き刺さる！室内OK。</div>
      </button>
      </div>
      <div class="steps" id="setup">
        📱 スマホを立てかけ、2歩さがって全身が映る位置へ。<br>
        🎥 背景は動きのない場所だと判定が安定します。
      </div>
    </div>
    <button class="mainBtn" id="startBtn">カメラを起動してキックオフ</button>
    <div id="err"></div>
  </div>
</div>

<script>
(()=>{
const $=id=>document.getElementById(id);
const video=$('video');
const AC=96,AR=72;
const a=document.createElement('canvas');a.width=AC;a.height=AR;
const actx=a.getContext('2d',{willReadFrequently:true});
let prev=null,stream=null;
let noise=1,thSide=10,thBurst=18;
let state='idle',mode='real';
const TOTAL=9;
let round=0,score=0,fqSum=0,fqN=0;

const speak=t=>{try{const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=1.15;
  speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}};
const vib=p=>{if(navigator.vibrate)navigator.vibrate(p)};
const DF=$('defender'),DFS=$('dfState'),CUE=$('cue'),SUB=$('sub'),BIG=$('big');
function bigMsg(t,c,ms=800){BIG.textContent=t;BIG.style.color=c||'#fff';
  BIG.classList.add('show');setTimeout(()=>BIG.classList.remove('show'),ms);}
function dfLean(dir,strong){
  const px=dir*Math.min(innerWidth*0.24,120)*(strong?1:0.25);
  DF.style.transform=`translateX(${px}px) rotate(${dir*(strong?16:5)}deg) scale(${strong?1.18:1.02})`;
}
function dfReset(){DF.style.transform='none';}
const dfSz=()=>(innerWidth>innerHeight&&innerHeight<520)?{s:'52px',b:'72px'}:{s:'70px',b:'96px'};

// ===== virtual ball layer =====
const fx=$('fx'),fctx=fx.getContext('2d');
let FW=0,FH=0;
function fxResize(){FW=innerWidth;FH=innerHeight;
  const d=Math.min(devicePixelRatio||1,2);
  fx.width=FW*d;fx.height=FH*d;fctx.setTransform(d,0,0,d,0,0);}
addEventListener('resize',()=>{fxResize();
  if(state==='play'||state==='calib')DF.style.fontSize=(phase==='feint'?dfSz().b:dfSz().s);});
fxResize();
// vball: x in [-1,1] screen offset / anim: null|'fly'|'steal'
const vball={x:0,y:0,vx:0,shake:0,anim:null,animT:0,fromX:0,trail:[]};
let userVX=0; // integrated body sway
function vballScreen(){
  return {x:FW/2+vball.x*FW*0.3, y:FH*0.70+vball.y};
}
function drawVBall(dt){
  fctx.clearRect(0,0,FW,FH);
  if(mode!=='virtual'||state==='idle')return;
  // goal at top
  const gw=Math.min(FW*0.55,240),gl=FW/2-gw/2,gt=FH*0.10;
  fctx.strokeStyle='rgba(255,255,255,.9)';fctx.lineWidth=4;
  fctx.strokeRect(gl,gt,gw,42);
  fctx.strokeStyle='rgba(255,255,255,.25)';fctx.lineWidth=1;
  for(let x=gl+8;x<gl+gw;x+=11){fctx.beginPath();fctx.moveTo(x,gt);fctx.lineTo(x,gt+42);fctx.stroke();}
  for(let y=gt+8;y<gt+42;y+=10){fctx.beginPath();fctx.moveTo(gl,y);fctx.lineTo(gl+gw,y);fctx.stroke();}
  // ball position / animations
  let p=vballScreen();
  if(vball.anim==='fly'){
    vball.animT+=dt;
    const t=Math.min(1,vball.animT/0.55);
    const sx=vball.fromX, tx=FW/2, sy=FH*0.70, ty=gt+21;
    p={x:sx+(tx-sx)*t, y:sy+(ty-sy)*(t*t*(3-2*t))};
    if(t>=1){vball.anim='goalflash';vball.animT=0;}
  }else if(vball.anim==='goalflash'){
    vball.animT+=dt;
    p={x:FW/2,y:gt+21};
    fctx.fillStyle=`rgba(255,210,63,${Math.max(0,0.5-vball.animT)})`;
    fctx.fillRect(gl,gt,gw,42);
    if(vball.animT>0.8)vball.anim=null;
  }else if(vball.anim==='steal'){
    vball.animT+=dt;
    p={x:vball.fromX,y:FH*0.70-vball.animT*380};
    if(vball.animT>0.8)vball.anim=null;
  }
  // trail
  vball.trail.push({x:p.x,y:p.y,life:.3});
  vball.trail.forEach(t=>t.life-=dt);
  vball.trail=vball.trail.filter(t=>t.life>0);
  vball.trail.forEach(t=>{fctx.fillStyle=`rgba(255,255,255,${t.life})`;
    fctx.beginPath();fctx.arc(t.x,t.y,14*t.life*2,0,7);fctx.fill();});
  // shadow + ball
  const sh=vball.shake?Math.sin(performance.now()/28)*vball.shake:0;
  fctx.fillStyle='rgba(0,0,0,.35)';
  fctx.beginPath();fctx.ellipse(p.x+sh,p.y+16,16,6,0,0,7);fctx.fill();
  fctx.fillStyle='#fff';fctx.beginPath();fctx.arc(p.x+sh,p.y,15,0,7);fctx.fill();
  fctx.strokeStyle='#222';fctx.lineWidth=1.5;
  fctx.beginPath();fctx.arc(p.x+sh,p.y,15,0,7);fctx.stroke();
  // pentagon
  fctx.fillStyle='#222';fctx.beginPath();
  for(let i=0;i<5;i++){const an=-Math.PI/2+i*1.257;
    const px2=p.x+sh+Math.cos(an)*6,py2=p.y+Math.sin(an)*6;
    i?fctx.lineTo(px2,py2):fctx.moveTo(px2,py2);}
  fctx.closePath();fctx.fill();
  vball.shake=Math.max(0,vball.shake-dt*20);
}

// ===== motion =====
function motion(){
  actx.save();actx.scale(-1,1);actx.drawImage(video,-AC,0,AC,AR);actx.restore();
  const cur=actx.getImageData(0,0,AC,AR).data;
  let L=0,C=0,R=0;
  if(prev){
    const third=Math.floor(AC/3), yStart=Math.floor(AR/3);
    for(let y=0;y<AR;y+=2){
      const w=y>=yStart?1.4:0.7;
      for(let x=0;x<AC;x+=2){
        const i=(y*AC+x)*4;
        const d=Math.abs(cur[i]-prev[i])+Math.abs(cur[i+1]-prev[i+1])+Math.abs(cur[i+2]-prev[i+2]);
        if(d>70){ if(x<third)L+=w; else if(x>=AC-third)R+=w; else C+=w; }
      }
    }
  }
  prev=cur.slice();
  return{L,C,R,total:L+C+R};
}
function zonesUI(m){
  $('zoneL').classList.toggle('hit',m.L>thSide);
  $('zoneR').classList.toggle('hit',m.R>thSide);
}
function timerBar(p){$('timerBar').style.width=(p*100)+'%';}

// ===== feint detection =====
let bursts=[];
function trackBursts(m){
  const now=performance.now();
  if(m.total>thBurst){
    let dir=0;
    if(m.L>m.R*1.3&&m.L>thSide)dir=-1;
    else if(m.R>m.L*1.3&&m.R>thSide)dir=1;
    const last=bursts[bursts.length-1];
    if(!last||now-last.t>110||last.dir!==dir)bursts.push({t:now,dir,mag:m.total});
    else last.mag=Math.max(last.mag,m.total);
  }
  bursts=bursts.filter(b=>now-b.t<1300);
}
function readFeint(m){
  const now=performance.now();
  const sided=bursts.filter(b=>b.dir!==0);
  let alt=0;
  for(let i=1;i<sided.length;i++)if(sided[i].dir!==sided[i-1].dir)alt++;
  if(alt>=2&&sided.length>=3){
    const lastDir=sided[sided.length-1].dir;
    const peak=Math.max(...sided.map(b=>b.mag));
    return{type:'scissors',dir:lastDir,sharp:peak/thBurst,name:'シザース'};
  }
  if(bursts.length){
    const lastB=bursts[bursts.length-1];
    const peak=Math.max(...bursts.map(b=>b.mag));
    if(now-lastB.t>250&&peak>thBurst*1.6&&m.total<thBurst*0.5){
      return{type:'kick',dir:lastB.dir||(Math.random()<.5?-1:1),sharp:peak/thBurst,name:'キックフェイント'};
    }
  }
  return null;
}

// ===== flow =====
let phase=null,phaseT=0,cueT=0,reqDir=0,touchGoal=0,touchCount=0;

function startCalib(){
  state='calib';phase='calib';
  DF.textContent='🧍';dfReset();DFS.textContent='';
  CUE.textContent=mode==='real'?'ボールを足元に置いて、静止':'画面前で構えて、静止';
  SUB.textContent='カメラ調整中…';
  vball.x=0;vball.anim=null;
  let samples=[],t0=performance.now();
  const iv=setInterval(()=>{
    const m=motion();samples.push(m.total);
    const s=(performance.now()-t0)/1000;
    SUB.textContent=`カメラ調整中… ${Math.max(0,(2.5-s)).toFixed(1)}`;
    if(s>2.5){
      clearInterval(iv);
      noise=Math.max(...samples,1);
      thSide=noise*1.2+7; thBurst=noise*2.2+14;
      speak('いくぞ');
      nextRound();
    }
  },80);
}

function nextRound(){
  bursts=[];prev=null;timerBar(0);$('gFill').style.width='0%';
  vball.anim=null;vball.x=0;userVX=0;
  round++;
  if(round>TOTAL)return endGame();
  $('round').textContent=round+'/'+TOTAL;
  if(round%3===0)return startTouchDrill();
  state='play';phase='approach';phaseT=performance.now();
  DF.textContent='🏃';DF.style.fontSize=dfSz().s;dfReset();
  DFS.textContent='DF 寄せてくる…';
  CUE.textContent='';SUB.textContent='';
  speak('来るぞ');
  setTimeout(()=>{
    if(phase!=='approach')return;
    DF.style.fontSize=dfSz().b;
    phase='feint';phaseT=performance.now();bursts=[];
    DFS.textContent='DF 間合いに入った';
    CUE.textContent='フェイントを入れろ！';
    SUB.textContent=mode==='real'
      ?'シザース＝左右に速く揺さぶる ／ キックフェイント＝大きく振って止める'
      :'体でシザース（左右に揺さぶる）or キックフェイント（大きく振って静止）';
    vib(30);
  },1000);
}

function onFeint(f){
  const q=Math.min(5,Math.max(1,Math.round(f.sharp)));
  fqSum+=q;fqN++;
  $('fq').textContent='★'.repeat(q);
  $('gFill').style.width=(q*20)+'%';
  const p=Math.min(0.95,0.35+q*0.13+(f.type==='scissors'?0.12:0));
  phase='bite';
  CUE.textContent=f.name+'！';SUB.textContent='';
  if(mode==='virtual')vball.shake=5; // 仮想ボールが揺れる
  if(Math.random()<p){
    reqDir=-f.dir;
    setTimeout(()=>{
      dfLean(f.dir,true);
      DFS.textContent='DF 食いついた！！';
      CUE.textContent=f.dir<0?'DFは左に飛んだ → 右へ抜けろ！':'DFは右に飛んだ → 左へ抜けろ！';
      speak(f.dir<0?'右だ！':'左だ！');vib([30,30,60]);
      phase='break';cueT=performance.now();prev=null;bursts=[];
      const bt=setInterval(()=>{
        const el=(performance.now()-cueT)/1800;
        timerBar(Math.min(1,el));
        if(phase!=='break'){clearInterval(bt);timerBar(0);}
        else if(el>=1){clearInterval(bt);judgeBreak(0);}
      },60);
    },220);
  }else{
    dfLean(f.dir,false);
    DFS.textContent='DF 釣られない…！';
    bigMsg('釣れない！','var(--blue)');speak('まだ甘い');
    setTimeout(()=>{
      dfReset();
      phase='feint';phaseT=performance.now();bursts=[];prev=null;
      CUE.textContent='もう一度！さらに鋭く！';SUB.textContent='動きを大きく・速く';
    },800);
  }
}

function judgeBreak(dir){
  if(phase!=='break')return;
  phase='feedback';timerBar(0);
  const rt=Math.round(performance.now()-cueT);
  dfReset();DF.textContent='🏃';DF.style.fontSize=dfSz().s;DFS.textContent='';
  if(dir===reqDir){
    score++;$('score').textContent=score;
    if(mode==='virtual'){
      // 仮想ボールが突破方向へ流れてゴールへ
      vball.x=reqDir*0.9;
      vball.fromX=vballScreen().x;
      vball.anim='fly';vball.animT=0;
      bigMsg('突破 → ゴール!!','var(--gold)',1000);
    }else{
      bigMsg(rt<500?'⚡完璧な突破!':'突破!!','var(--ok)');
    }
    speak('ナイス突破');vib([40,30,80]);
  }else if(dir===0){
    if(mode==='virtual'){vball.fromX=vballScreen().x;vball.anim='steal';vball.animT=0;}
    bigMsg(mode==='virtual'?'ボールを奪われた!':'持ち出しが遅い!','var(--ng)');
    speak('遅い');vib(120);
  }else{
    bigMsg('DFに戻られた!','var(--ng)');speak('逆だ');vib(120);
  }
  CUE.textContent='';SUB.textContent='';
  setTimeout(nextRound,mode==='virtual'&&dir===reqDir?1400:1000);
}

// ===== ball touch drill =====
function startTouchDrill(){
  state='play';phase='touch';
  touchGoal=6;touchCount=0;
  DF.textContent='⚽';DF.style.fontSize=dfSz().s;dfReset();
  DFS.textContent='タッチ課題';
  CUE.textContent=mode==='real'?'トータップ！細かく速くタッチし続けろ':'その場で速い足踏み！仮想ボールを転がし続けろ';
  SUB.textContent='6秒間、足を止めるな';
  speak('タッチ！');
  cueT=performance.now();
  const iv=setInterval(()=>{
    if(phase!=='touch'){clearInterval(iv);timerBar(0);return;}
    const el=(performance.now()-cueT)/1000;
    timerBar(Math.min(1,el/8));
    SUB.textContent=`残り ${Math.max(0,touchGoal-touchCount).toFixed(1)} 秒ぶんのタッチ`;
    if(touchCount>=touchGoal){
      clearInterval(iv);timerBar(0);
      phase='feedback';
      bigMsg('タッチ◎','var(--gold)');speak('いいリズム');vib([30,30,30]);
      $('gFill').style.width='100%';
      setTimeout(nextRound,900);
    }else if(el>8){
      clearInterval(iv);timerBar(0);
      phase='feedback';
      bigMsg('足が止まった…','var(--ng)');speak('止まるな');
      setTimeout(nextRound,900);
    }
  },100);
}

// ===== main loop =====
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-lastT)/1000,0.05);lastT=t;
  if(stream&&video.readyState>=2){
    const m=motion();
    zonesUI(m);
    // 仮想ボール：体の左右の動きで転がる
    if(mode==='virtual'&&state==='play'&&!vball.anim){
      const drive=(m.R-m.L)/Math.max(thSide*3,1);
      userVX+=(drive-userVX)*Math.min(1,dt*8);
      vball.x=Math.max(-1,Math.min(1,vball.x+userVX*dt*3));
      vball.x*=Math.pow(0.6,dt); // 中央へゆっくり戻る
      if(m.total>thBurst)vball.shake=Math.max(vball.shake,2);
    }
    if(state==='play'){
      if(phase==='feint'){
        trackBursts(m);
        $('gFill').style.width=Math.min(100,(m.total/(thBurst*3))*100)+'%';
        const f=readFeint(m);
        if(f)onFeint(f);
        else if(performance.now()-phaseT>5000){
          phase='feedback';
          if(mode==='virtual'){vball.fromX=vballScreen().x;vball.anim='steal';vball.animT=0;}
          bigMsg('取られた…','var(--ng)');speak('奪われた');vib(150);
          setTimeout(nextRound,900);
        }
      }else if(phase==='break'&&performance.now()-cueT>120){
        if(m.L>thSide*1.6&&m.L>m.R*1.4)judgeBreak(-1);
        else if(m.R>thSide*1.6&&m.R>m.L*1.4)judgeBreak(1);
      }else if(phase==='touch'){
        if(m.total>thBurst*0.8){touchCount+=0.1;if(mode==='virtual')vball.shake=3;}
      }
    }
  }
  drawVBall(dt);
}

function endGame(){
  state='done';
  const fq=fqN?(fqSum/fqN).toFixed(1):'-';
  $('resultBox').style.display='block';
  $('rScore').textContent=`突破 ${score}`;
  $('rDetail').innerHTML=`フェイント平均 <b>★${fq}</b>（${mode==='real'?'ボールあり':'仮想ボール'}）<br>`+
    (score>=5?'DF殺しの切れ味。実戦でも仕掛けろ。':score>=3?'いい駆け引き。フェイントをもう一段大きく鋭く。':'まずはシザースを大げさに。DFは体全体の揺さぶりに釣られる。');
  $('modeSel').style.display='block';
  document.querySelector('.card h1').innerHTML='トレーニング終了';
  $('startBtn').textContent='もう一回';
  $('overlay').classList.remove('hide');
  speak('お疲れさま');
}

// ===== mode select & start =====
function selMode(m){
  mode=m;
  $('modeReal').classList.toggle('sel',m==='real');
  $('modeVirtual').classList.toggle('sel',m==='virtual');
}
$('modeReal').addEventListener('click',()=>selMode('real'));
$('modeVirtual').addEventListener('click',()=>selMode('virtual'));

$('startBtn').addEventListener('click',async()=>{
  $('err').style.display='none';
  if(!stream){
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640}},audio:false});
      video.srcObject=stream;await video.play();
    }catch(e){
      $('err').style.display='block';
      $('err').innerHTML='カメラを起動できませんでした（'+e.name+'）。<br>'+
        'このプレビュー内ではカメラが許可されないことがあります。<b>ファイルをダウンロードしてSafariやChromeで直接開いて</b>ください。';
      return;
    }
  }
  round=0;score=0;fqSum=0;fqN=0;
  $('score').textContent=0;$('fq').textContent='-';$('round').textContent='-';
  $('overlay').classList.add('hide');
  setTimeout(startCalib,500);
});

requestAnimationFrame(loop);
})();
</script>
</body>
